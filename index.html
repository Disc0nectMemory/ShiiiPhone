<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ElmPhone" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#e0e0e5" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="https://traditional-sapphire-v04jn15eex.edgeone.app/ElmPhone.png.jpeg" />
    <link rel="apple-touch-icon" href="https://traditional-sapphire-v04jn15eex.edgeone.app/ElmPhone.png.jpeg" />
    <title>ElmPhone</title>
    <script>
      // Prevent double-tap zoom
      document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });
      
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
